<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merton Council: Stop Funding Genocide</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: #f5f5f5;
}

.banner {
  background: #1f4d2e;
  color: white;
  padding: 12px 20px 25px 20px;
}

.banner-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-group img {
  height: 40px;
}

.logo-text {
  font-size: 14px;
}

.share-btn {
  background: white;
  color: #1f4d2e;
  border: none;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.banner-main {
  font-size: 32px;
  font-weight: bold;
  margin-top: 10px;
}

.container {
  max-width: 650px;
  margin: 30px auto;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  text-align: left;
}

input {
  width: 92%;
  padding: 12px;
  margin-bottom: 12px;
}

button {
  background: #28a745;
  color: white;
  border: none;
  padding: 14px 22px;
  cursor: pointer;
  border-radius: 6px;
}

.hidden { display: none; }

.result-card {
  margin-top: 20px;
  padding: 20px;
  background: white;
  border-radius: 8px;
}

.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
}

.modal-content button {
  display: block;
  width: 80%;
  margin: 6px auto;
}

.modal-close {
  background: #555 !important;
}
</style>
</head>

<body>

<div class="banner">
  <div class="banner-top">
    <div class="logo-group">
      <img src="https://mertonfop.github.io/Merton-Divestment/logo.png">
      <div class="logo-text">Merton Friends of Palestine</div>
    </div>
    <button class="share-btn" onclick="openShare()">
      <i class="fa-solid fa-share"></i>
    </button>
  </div>

  <div class="banner-main">
    Tell Merton Council<br>Stop Funding Genocide
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal" id="shareModal">
  <div class="modal-content">
    <h3>Share</h3>
    <button onclick="shareLink('email')"><i class="fa-solid fa-envelope"></i> Email</button>
    <button onclick="shareLink('whatsapp')"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
    <button onclick="shareLink('facebook')"><i class="fa-brands fa-facebook"></i> Facebook</button>
    <button onclick="shareLink('x')"><i class="fa-brands fa-x-twitter"></i></button>
    <button class="modal-close" onclick="closeShare()">Close</button>
  </div>
</div>

<div class="container">

<h3>Step 1: Enter postcode</h3>
<div class="box">
<input type="text" id="postcode" placeholder="SW19 1AB">
<br>
<button onclick="findCouncillors()">Find my councillors</button>
</div>

<div id="results" class="hidden"></div>

</div>

<script>
// Modal
function openShare(){ document.getElementById('shareModal').style.display='block'; }
function closeShare(){ document.getElementById('shareModal').style.display='none'; }

// Share links (YOUR URLs)
function shareLink(type){
  if(type==='email'){
    window.location.href='mailto:?subject=1-minute%20action%3A%20Merton%20divestment&body=Hi%2C%0D%0A%0D%0AI%20just%20did%20this%20quick%201-minute%20action%20and%20thought%20you%20might%20want%20to%20as%20well%20-%20it%E2%80%99s%20to%20urge%20Merton%20Council%20to%20go%20further%20on%20divestment%3A%0D%0A%0D%0Ahttps%3A%2F%2Fmertonfop.github.io%2FMerton-Divestment%2F';
  } 
  else if(type==='whatsapp'){
    window.open('https://wa.me/?text=Tell%20Merton%20Council%20to%20Stop%20Funding%20Genocide%3A%0D%0Ahttps%3A%2F%2Fmertonfop.github.io%2FMerton-Divestment%2F');
  } 
  else if(type==='facebook'){
    window.open('https://www.facebook.com/sharer/sharer.php?u=https://mertonfop.github.io/Merton-Divestment/');
  } 
  else if(type==='x'){
    window.open('https://x.com/intent/post?text=Tell%20Merton%20Council%20to%20Stop%20Funding%20Genocide%3A%0D%0Ahttps%3A%2F%2Fmertonfop.github.io%2FMerton-Divestment%2F');
  }
}

// Demo councillor finder (replace with your full version if needed)
async function findCouncillors(){
  const postcode = document.getElementById('postcode').value;
  const resultDiv = document.getElementById('results');

  if(!postcode){
    resultDiv.innerHTML = "<div class='result-card'>Please enter a postcode</div>";
    resultDiv.classList.remove('hidden');
    return;
  }

  resultDiv.innerHTML = "<div class='result-card'>Lookup working (placeholder)</div>";
  resultDiv.classList.remove('hidden');
  resultDiv.scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
